plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'io.github.minecraftfeather'
version = '1.0.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.ow2.asm:asm:9.6'
    implementation 'org.ow2.asm:asm-tree:9.6'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.feather.loader.FeatherLauncher',
            'Premain-Class': 'com.feather.loader.FeatherAgent',
            'Can-Retransform-Classes': 'true',
            'Implementation-Title': 'FeatherLoader',
            'Implementation-Version': project.version
        )
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            groupId = group
            artifactId = 'feather-loader'
            version = version
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/MinecraftFeather/feather-loader"
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
